name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Choose sync pipeline from branch
        id: sync
        run: |
          if [ "${{ github.head_ref }}" = "figma-ssot" ]; then
            echo "cmd=sync:figma" >> "$GITHUB_OUTPUT"
            echo "source=figma/tokens.json" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=sync:md" >> "$GITHUB_OUTPUT"
            echo "source=design-system-foundations.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate outputs (must match committed files)
        run: pnpm run ${{ steps.sync.outputs.cmd }}

      - name: Fail if generated files drift
        run: |
          git add -A
          if ! git diff --staged --exit-code; then
            echo "::error::Run \`pnpm run ${{ steps.sync.outputs.cmd }}\` locally and commit \`tokens/\`, \`dist/\`, \`figma/tokens.json\` (if applicable), and \`package.json\`."
            echo "Source of truth for this branch: ${{ steps.sync.outputs.source }}"
            git diff --staged
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Assemble Android library
        run: chmod +x gradlew && ./gradlew :design-tokens-android:assembleRelease --no-daemon
