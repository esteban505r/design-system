name: CI

on:
  pull_request:
    branches: [main, belcorp]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Regenerate outputs from figma/tokens.json (must match committed files)
        run: pnpm run sync:figma

      - name: Fail if generated files drift
        run: |
          git add -A
          if ! git diff --staged --exit-code; then
            echo "::error::Run \`pnpm run sync:figma\` locally and commit \`tokens/\`, \`dist/\`, and \`package.json\`."
            echo "Source of truth: figma/tokens.json"
            git diff --staged
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Assemble Android library
        run: chmod +x gradlew && ./gradlew :design-tokens-android:assembleRelease --no-daemon
