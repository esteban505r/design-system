# Regenerate tokens/ + dist/ from design-system-foundations.md (markdown SSOT path).
# Manual only (workflow_dispatch) — no push trigger, to avoid circular runs when the
# bot commits generated files or when foundations and outputs land in the same push.
#
# Pipeline: pnpm run sync:md
#   design-system-foundations.md → tokens/**/*.json → figma/tokens.json → dist/**
#
# Requires: Settings → Actions → General → Workflow permissions:
#   - Read and write
#   - Allow GitHub Actions to create and approve pull requests (optional, for gh pr create)

name: Sync tokens from markdown

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: token-sync-md-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate all outputs from design-system-foundations.md
        run: pnpm run sync:md

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes after sync:md — working tree already up to date."
            exit 0
          fi
          git commit -m "chore(tokens): sync from design-system-foundations.md"
          git push

      - name: Open pull request (feature branches only)
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COUNT=$(gh pr list -H "$BRANCH" --state open --json number --jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            PR_BODY_FILE="$(mktemp)"
            {
              echo 'Auto-generated with `pnpm run sync:md`:'
              echo ''
              echo '- **Source:** `design-system-foundations.md` (`**Version:**` → `package.json`)'
              echo '- **Outputs:** `tokens/`, `figma/tokens.json`, `dist/` (all platforms)'
              echo ''
              echo 'See [docs/workflow-and-production.md](docs/workflow-and-production.md).'
            } > "$PR_BODY_FILE"
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Design tokens: update from foundations markdown" \
              --body-file "$PR_BODY_FILE"; then
              echo "::warning::Could not open a PR — enable 'Allow GitHub Actions to create and approve pull requests' in repo Settings → Actions."
              echo "Or open a PR manually from ${BRANCH} → main (sync commit was pushed)."
              exit 0
            fi
          else
            echo "Open PR already exists for branch $BRANCH"
          fi
