# Manual publish: Actions → Publish Android library → Run workflow (choose branch, usually `main`).
# Publishes the Android library to GitHub Packages (Gradle/Maven).
#
# source=figma → sync:figma (figma/tokens.json) → dist/android/*.xml → AAR
# source=md    → sync:md (design-tokens block + **Version:** in foundations.md) → dist/android/*.xml → AAR
# Gradle only packages dist/android/; it does not read figma/tokens.json.
#
# GitHub Packages returns HTTP 409 if that GAV already exists — use a new version input.

name: Publish Android library

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver) — updates design-system-foundations.md **Version:**'
        required: true
        type: string
      source:
        description: 'Token source for sync before publish'
        required: true
        type: choice
        default: figma
        options:
          - figma
          - md

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Set release version in source files
        run: node set-release-version.mjs --version "${{ inputs.version }}"

      - name: Verify token source inputs
        run: |
          case "${{ inputs.source }}" in
            figma)
              test -f figma/tokens.json || {
                echo "::error::source=figma requires figma/tokens.json on this branch"
                exit 1
              }
              ;;
            md)
              grep -qE '```json[[:space:]]+(design-tokens|figma-tokens)' design-system-foundations.md || {
                echo "::error::source=md requires a \`\`\`json design-tokens block in design-system-foundations.md (sync:md does not read figma/tokens.json)"
                exit 1
              }
              grep -qE '\*\*Version:\*\*[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+' design-system-foundations.md || {
                echo "::error::source=md requires **Version:** semver in design-system-foundations.md"
                exit 1
              }
              ;;
          esac

      - name: Sync tokens before publish
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          case "${{ inputs.source }}" in
            figma) pnpm run sync:figma ;;
            md) pnpm run sync:md ;;
            *)
              echo "::error::Unknown source: ${{ inputs.source }} (expected figma or md)"
              exit 1
              ;;
          esac
          echo "Synced from source: ${{ inputs.source }}"

      - name: Ensure release version after sync
        run: node set-release-version.mjs --version "${{ inputs.version }}"

      - name: Verify Android dist before Gradle
        run: |
          set -e
          for f in colors.xml dimens.xml integers.xml strings.xml; do
            test -f "dist/android/$f" || { echo "::error::Missing dist/android/$f — sync failed?"; exit 1; }
          done
          grep -q 'name="font_size_h1"' dist/android/dimens.xml || {
            echo "::error::dist/android/dimens.xml has no font_size_h1 (typography tokens missing)"
            exit 1
          }
          if grep -E '<(dimen|item)[^>]*>[^<]*pxpx' dist/android/dimens.xml; then
            echo "::error::Invalid Android dimen (e.g. 28pxpx) — fix figmaTokenToDtcg / sync and republish"
            exit 1
          fi
          echo "dist/android resource counts:"
          grep -c 'name="' dist/android/*.xml

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXPECTED="${{ inputs.version }}"
          VERSION=$(jq -r .version package.json)
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::package.json version is $VERSION but expected $EXPECTED after sync"
            exit 1
          fi
          echo "Publishing design-tokens-android version ${VERSION}"
          chmod +x gradlew
          ./gradlew :design-tokens-android:publish -PtokensVersion="$VERSION" --no-daemon
