# Manual publish: Actions → Publish Android library → Run workflow (choose branch, usually `main`).
# Publishes the Android library to GitHub Packages (Gradle/Maven).
#
# Version = **Version:** in design-system-foundations.md (copied into package.json by `pnpm run sync`).
# GitHub Packages returns HTTP 409 if that GAV already exists —
# bump the version in the markdown, merge, run sync, then run this workflow again.

name: Publish Android library

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          echo "Publishing design-tokens-android (groupId/artifactId from gradle.properties) version ${VERSION}"
          echo "If Gradle fails with 409 Conflict, bump **Version:** in design-system-foundations.md — that version is already on GitHub Packages."
          chmod +x gradlew
          ./gradlew :design-tokens-android:publish -PtokensVersion="$VERSION" --no-daemon
