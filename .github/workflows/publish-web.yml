# Manual publish: Actions → Publish web tokens (npm) → Run workflow (usually `main`).
# Publishes this repo’s npm package (CSS + JS + flat JSON) using npm Trusted Publishing (OIDC).
# No NPM_TOKEN — configure the package on npmjs.com (see README).
#
# Requires: npm CLI ≥ 11.5.1, Node ≥ 22.14.0 (https://docs.npmjs.com/trusted-publishers/).
# Version from package.json after sync (from figma $metadata.version or markdown **Version:**).

name: Publish web tokens (npm)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g "npm@^11.5.1"

      - run: pnpm install --frozen-lockfile

      - name: Sync tokens before publish
        run: |
          if [ "${GITHUB_REF_NAME}" = "figma-ssot" ]; then
            pnpm run sync:figma
          else
            pnpm run sync:md
          fi

      - name: Publish to npm (OIDC trusted publishing)
        run: |
          VERSION=$(jq -r .version package.json)
          echo "Publishing @estebanruano/design-tokens@${VERSION} (OIDC; ensure Trusted Publisher on npm matches workflow publish-web.yml)"
          npm publish --access public
