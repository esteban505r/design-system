# When figma/tokens.json (SSOT) changes, regenerate tokens/ + dist/ and open a PR.
#
# Requires: Settings → Actions → General → Workflow permissions:
#   - Read and write
#   - Allow GitHub Actions to create and approve pull requests (for gh pr create)

name: Sync tokens from Figma JSON

on:
  push:
    paths:
      - 'figma/tokens.json'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: token-sync-figma-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Regenerate tokens and platform outputs
        run: pnpm run sync

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes after sync — working tree already up to date."
            exit 0
          fi
          git commit -m "chore(tokens): sync from figma/tokens.json"
          git push

      - name: Open pull request (feature branches only)
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COUNT=$(gh pr list -H "$BRANCH" --state open --json number --jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Design tokens: update from figma/tokens.json" \
              --body "Auto-generated from \`figma/tokens.json\` (single source of truth). Review \`tokens/\`, \`dist/\`, and \`package.json\`. See [docs/figma-ssot.md](docs/figma-ssot.md)."; then
              echo "::warning::Could not open a PR (GitHub blocked createPullRequest)."
              echo "Enable: Settings → Actions → General → Workflow permissions →"
              echo "  'Allow GitHub Actions to create and approve pull requests'"
              echo "Or open a PR manually from branch ${BRANCH} → main (sync commit was pushed)."
              exit 0
            fi
          else
            echo "Open PR already exists for branch $BRANCH"
          fi
