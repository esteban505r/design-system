# Regenerate tokens/ + dist/ when figma/tokens.json changes (Figma SSOT path).
#
# Pipeline: pnpm run sync:figma
#   figma/tokens.json → tokens/**/*.json → dist/** (platform outputs)
#
# Requires: Settings → Actions → General → Workflow permissions:
#   - Read and write
#   - Allow GitHub Actions to create and approve pull requests (optional, for gh pr create)

name: Sync tokens from Figma JSON

on:
  push:
    paths:
      - 'figma/tokens.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: token-sync-figma-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate all outputs from figma/tokens.json
        run: pnpm run sync:figma

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes after sync:figma — working tree already up to date."
            exit 0
          fi
          git commit -m "chore(tokens): sync from figma/tokens.json"
          git push

      - name: Open pull request (feature branches only)
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COUNT=$(gh pr list -H "$BRANCH" --state open --json number --jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            PR_BODY_FILE="$(mktemp)"
            {
              echo 'Auto-generated with `pnpm run sync:figma`:'
              echo ''
              echo '- **Source:** `figma/tokens.json`'
              echo '- **Outputs:** `tokens/`, `dist/` (web, Android, iOS, Flutter, Compose, Figma copy), `package.json` (version from `$metadata.version`)'
              echo ''
              echo 'See [docs/figma-ssot.md](docs/figma-ssot.md).'
            } > "$PR_BODY_FILE"
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Design tokens: update from figma/tokens.json" \
              --body-file "$PR_BODY_FILE"; then
              echo "::warning::Could not open a PR (GitHub blocked createPullRequest)."
              echo "Enable: Settings → Actions → General → Workflow permissions →"
              echo "  'Allow GitHub Actions to create and approve pull requests'"
              echo "Or open a PR manually from branch ${BRANCH} → main (sync commit was pushed)."
              exit 0
            fi
          else
            echo "Open PR already exists for branch $BRANCH"
          fi
